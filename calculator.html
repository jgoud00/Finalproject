<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Check your scholarship eligibility — enter your marks and income to find matching scholarships.">
  <title>Eligibility Checker — ScholarPath</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<nav class="navbar">
  <div class="container nav-inner">
    <a href="index.html" class="nav-logo">🎓 ScholarPath</a>
    <a href="index.html">Home</a>
    <a href="scholarships.html">Scholarships</a>
    <a href="calculator.html" class="active">Eligibility</a>
  </div>
</nav>

<div class="page-header">
  <div class="container">
    <h1>Eligibility Checker</h1>
    <p>Enter your details to find scholarships you may qualify for.</p>
  </div>
</div>

<main class="section">
  <div class="container">
    <div class="calc-card" style="max-width:480px;">
      <h2>Check Your Eligibility</h2>
      <form id="eligForm" novalidate>

        <div class="form-group">
          <label for="marks">Class XII Marks (%)</label>
          <input type="number" id="marks" min="0" max="100" step="0.1" placeholder="e.g. 87.5" required aria-required="true" aria-describedby="marksErr">
          <p class="err-msg" id="marksErr" role="alert"></p>
          <p class="form-hint">Enter your percentage between 0 and 100</p>
        </div>

        <div class="form-group">
          <label for="income">Annual Family Income (₹)</label>
          <input type="number" id="income" min="0" step="10000" placeholder="e.g. 450000" required aria-required="true" aria-describedby="incomeErr">
          <p class="err-msg" id="incomeErr" role="alert"></p>
          <p class="form-hint">Total household income per year in rupees</p>
        </div>

        <div class="form-group">
          <label for="catSel">Category</label>
          <select id="catSel">
            <option value="general">General</option>
            <option value="obc">OBC</option>
            <option value="sc">SC</option>
            <option value="st">ST</option>
            <option value="ews">EWS</option>
          </select>
        </div>

        <div class="form-group">
          <label for="course">Course / Stream</label>
          <select id="course">
            <option value="science">Science (B.Sc / B.Tech)</option>
            <option value="arts">Arts / Humanities</option>
            <option value="commerce">Commerce (B.Com / BBA)</option>
            <option value="medicine">Medicine (MBBS / BDS)</option>
            <option value="law">Law (LLB)</option>
            <option value="other">Other</option>
          </select>
        </div>

        <button type="submit" class="btn btn-blue" style="width:100%;">Find Eligible Scholarships</button>

      </form>
    </div>

    <div id="results" style="max-width:480px;margin-top:16px;"></div>

  </div>
</main>

<footer class="footer">
  <strong>ScholarPath</strong> &nbsp;·&nbsp;
  <a href="index.html">Home</a> &nbsp;·&nbsp;
  <a href="scholarships.html">Scholarships</a>
</footer>

<script type="module" src="app.js" defer></script>
</body>
</html>
